# Apache VirtualHost configuration for a subdomain
# Example: craut.yourdomain.com
# 
# Enable required modules:
#   sudo a2enmod wsgi ssl headers rewrite
#
# Place this file in: /etc/apache2/sites-available/craut.conf
# Enable the site: sudo a2ensite craut
# Reload Apache: sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName craut.yourdomain.com
    ServerAdmin admin@yourdomain.com

    # Redirect HTTP to HTTPS (recommended)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName craut.yourdomain.com
    ServerAdmin admin@yourdomain.com

    # SSL Configuration (adjust paths to your certificates)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/craut.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/craut.yourdomain.com/privkey.pem
    
    # WSGI Configuration
    WSGIDaemonProcess craut user=www-data group=www-data threads=5 python-home=/home/samuel/uibk/projects/craut/venv
    WSGIProcessGroup craut
    WSGIScriptAlias / /home/samuel/uibk/projects/craut/wsgi.py

    # Application directory permissions
    <Directory /home/samuel/uibk/projects/craut>
        WSGIProcessGroup craut
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Static files (served directly by Apache for better performance)
    Alias /static /home/samuel/uibk/projects/craut/static
    <Directory /home/samuel/uibk/projects/craut/static>
        Require all granted
        # Cache static files for 1 hour
        Header set Cache-Control "max-age=3600, public"
    </Directory>

    # Uploads directory (if you want direct access)
    Alias /uploads /home/samuel/uibk/projects/craut/uploads
    <Directory /home/samuel/uibk/projects/craut/uploads>
        Require all granted
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/craut-error.log
    CustomLog ${APACHE_LOG_DIR}/craut-access.log combined

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>

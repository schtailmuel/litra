# Apache VirtualHost configuration for a subdomain
# Example: litra.yourdomain.com
# 
# Enable required modules:
#   sudo a2enmod wsgi ssl headers rewrite
#
# Place this file in: /etc/apache2/sites-available/litra.conf
# Enable the site: sudo a2ensite litra
# Reload Apache: sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName litra.yourdomain.com
    ServerAdmin admin@yourdomain.com

    # Redirect HTTP to HTTPS (recommended)
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName litra.yourdomain.com
    ServerAdmin admin@yourdomain.com

    # SSL Configuration (adjust paths to your certificates)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/litra.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/litra.yourdomain.com/privkey.pem
    
    # WSGI Configuration
    WSGIDaemonProcess litra user=www-data group=www-data threads=5 python-home=/home/samuel/uibk/projects/litra/venv
    WSGIProcessGroup litra
    WSGIScriptAlias / /home/samuel/uibk/projects/litra/wsgi.py

    # Application directory permissions
    <Directory /home/samuel/uibk/projects/litra>
        WSGIProcessGroup litra
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Static files (served directly by Apache for better performance)
    Alias /static /home/samuel/uibk/projects/litra/static
    <Directory /home/samuel/uibk/projects/litra/static>
        Require all granted
        # Cache static files for 1 hour
        Header set Cache-Control "max-age=3600, public"
    </Directory>

    # Uploads directory (if you want direct access)
    Alias /uploads /home/samuel/uibk/projects/litra/uploads
    <Directory /home/samuel/uibk/projects/litra/uploads>
        Require all granted
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/litra-error.log
    CustomLog ${APACHE_LOG_DIR}/litra-access.log combined

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>

# Apache configuration for running under a subpath
# Example: yourdomain.com/craut
#
# Add this to your existing VirtualHost configuration
# Location: /etc/apache2/sites-available/yourdomain.conf
#
# Enable required modules:
#   sudo a2enmod wsgi headers

# Add this inside your existing <VirtualHost *:443> or <VirtualHost *:80> block:

    # WSGI Configuration for /craut path
    WSGIDaemonProcess craut user=www-data group=www-data threads=5 python-home=/home/samuel/uibk/projects/craut/venv
    WSGIScriptAlias /craut /home/samuel/uibk/projects/craut/wsgi.py

    # Application directory permissions
    <Directory /home/samuel/uibk/projects/craut>
        WSGIProcessGroup craut
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Static files under /craut/static
    Alias /craut/static /home/samuel/uibk/projects/craut/static
    <Directory /home/samuel/uibk/projects/craut/static>
        Require all granted
        Header set Cache-Control "max-age=3600, public"
    </Directory>

    # Uploads under /craut/uploads
    Alias /craut/uploads /home/samuel/uibk/projects/craut/uploads
    <Directory /home/samuel/uibk/projects/craut/uploads>
        Require all granted
    </Directory>

# NOTE: If using a subpath, you need to modify app.py to set APPLICATION_ROOT:
# app.config["APPLICATION_ROOT"] = "/craut"

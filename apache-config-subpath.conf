# Apache configuration for running under a subpath
# Example: yourdomain.com/litra
#
# Add this to your existing VirtualHost configuration
# Location: /etc/apache2/sites-available/yourdomain.conf
#
# Enable required modules:
#   sudo a2enmod wsgi headers

# Add this inside your existing <VirtualHost *:443> or <VirtualHost *:80> block:

    # WSGI Configuration for /litra path
    WSGIDaemonProcess litra user=www-data group=www-data threads=5 python-home=/home/samuel/uibk/projects/litra/venv
    WSGIScriptAlias /litra /home/samuel/uibk/projects/litra/wsgi.py

    # Application directory permissions
    <Directory /home/samuel/uibk/projects/litra>
        WSGIProcessGroup litra
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Static files under /litra/static
    Alias /litra/static /home/samuel/uibk/projects/litra/static
    <Directory /home/samuel/uibk/projects/litra/static>
        Require all granted
        Header set Cache-Control "max-age=3600, public"
    </Directory>

    # Uploads under /litra/uploads
    Alias /litra/uploads /home/samuel/uibk/projects/litra/uploads
    <Directory /home/samuel/uibk/projects/litra/uploads>
        Require all granted
    </Directory>

# NOTE: If using a subpath, you need to modify app.py to set APPLICATION_ROOT:
# app.config["APPLICATION_ROOT"] = "/litra"
